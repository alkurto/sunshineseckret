<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Secret</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

#result{
font-size:40px;
margin-bottom:40px;
text-align:center;
}

#result img{
max-width:400px;
}

input{
width:350px;
padding:15px;
font-size:20px;
text-align:center;
border:2px solid white;
background:black;
color:white;
}

button{
margin-top:15px;
padding:10px 25px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="result"></div>

<input id="text" placeholder="enter phrase">
<button onclick="check()">send</button>

<script>

function check(){

let value = document.getElementById("text").value.toLowerCase();
let result = document.getElementById("result");

if(value == "sunshine valley"){
    result.innerHTML = "What the fuck do you want?";
}

else if(value == "summer"){
    result.innerHTML = "very good but what do you want?";
}

else if(value == "you bad"){
    result.innerHTML = "no/;";
}

else if(value == "67"){
    result.innerHTML = "stupid boy";
}

else if(value == "im good"){
    result.innerHTML = "ziptobibkibab ^w^";
}

else if(value == "fanmade"){
    result.innerHTML = '<img src="fanmade.png">';
}

else if(value == "клоун"){
    result.innerHTML = '<img src="clown.png">';
}

// новая команда "clol"
else if(value == "clol"){
    result.innerHTML = '<img src="special.png">';
}

else if(value == "miramistin"){
    result.innerHTML = `
      <video controls autoplay>
        <source src="bibizan.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
      </video>
    `;
}
    
}

else{
    result.innerHTML = "...";
}

}

</script>

</body>

</html>
